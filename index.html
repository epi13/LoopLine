<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoopLine</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="control-bar" aria-label="Playback controls">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1 class="app-title">LOOPLINE</h1>
            <p class="tagline">live notation as moving art</p>
          </div>
        </div>

        <label class="field field-md">
          <span class="field-label">MIDI IN</span>
          <select id="midi-selector" name="midi-selector">
            <option value="">No device selected</option>
          </select>
        </label>

        <label class="field field-sm">
          <span class="field-label">BPM</span>
          <input id="bpm" name="bpm" type="number" min="20" max="300" value="96" />
        </label>

        <label class="field field-sm">
          <span class="field-label">BEATS / LOOP</span>
          <input id="beats-per-loop" name="beats-per-loop" type="number" min="1" max="64" value="4" />
        </label>

        <div class="transport" role="group" aria-label="Transport">
          <button id="play" class="transport-main" type="button" aria-label="Play">
            <span class="icon" aria-hidden="true" style="--icon-src: url('./assets/icons/play.svg')"></span>
          </button>
          <button id="stop" class="transport-aux" type="button" aria-label="Stop">
            <span class="icon" aria-hidden="true" style="--icon-src: url('./assets/icons/stop.svg')"></span>
          </button>
          <button id="record" type="button" hidden>Record</button>
          <button id="clear" type="button">CLEAR</button>
        </div>

        <label class="field field-sm">
          <span class="field-label">QUANTIZE</span>
          <select id="quantize" name="quantize">
            <option value="off">Off</option>
            <option value="1/4">1/4</option>
            <option value="1/8" selected>1/8</option>
            <option value="1/16">1/16</option>
          </select>
        </label>

        <label class="field field-sm">
          <span class="field-label">MODE</span>
          <select id="loop-mode" name="loop-mode">
            <option value="replace" selected>OVERWRITE</option>
            <option value="overdub">OVERDUB</option>
          </select>
        </label>

        <div class="field utility-actions" role="group" aria-label="Utility controls">
          <button type="button" aria-label="Menu" title="Menu">
            <span class="icon" aria-hidden="true" style="--icon-src: url('./assets/icons/menu.svg')"></span>
          </button>
        </div>
      </header>

      <main class="content" aria-label="Sequencer workspace">
        <section class="panel beat-line-panel" aria-labelledby="beat-line-heading">
          <div class="panel-heading">
            <div>
              <h2 id="beat-line-heading">BEAT LINE</h2>
              <p>metronome</p>
            </div>
            <div class="click-controls">
              <span>CLICK SOUND</span>
              <input id="click-enabled" name="click-enabled" type="checkbox" checked aria-label="Enable metronome click" />
              <span class="dot-toggle" aria-hidden="true"></span>
              <button type="button" aria-label="Metronome settings" title="Metronome settings">
                <span class="icon" aria-hidden="true" style="--icon-src: url('./assets/icons/settings.svg')"></span>
              </button>
            </div>
          </div>
          <div id="beat-line" class="panel-body" role="presentation"></div>
        </section>

        <section class="notation-panel" aria-labelledby="notation-heading">
          <h2 id="notation-heading" class="sr-only">Notation</h2>
          <div id="notation" class="panel-body" role="presentation"></div>
        </section>
      </main>

      <footer class="status-strip" aria-live="polite">
        <span>STATUS</span>
        <span id="status-text">PLAYING</span>
        <span>LOOP 1.1.3</span>
        <span>TEMPO SYNC ●</span>
        <span>INPUT ACTIVE ▮▮▮▮▮</span>
      </footer>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
